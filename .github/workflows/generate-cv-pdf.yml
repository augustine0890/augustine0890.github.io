name: Generate CV PDF

on:
  push:
    branches: [main]
    paths:
      - '_pages/cv.md'
      - '_sass/**'
      - '_layouts/**'
      - '_includes/**'
  workflow_dispatch:

jobs:
  generate-pdf:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true

      - name: Build Jekyll site
        run: bundle exec jekyll build

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Puppeteer
        run: npm install puppeteer

      - name: Serve built site
        run: python3 -m http.server 4000 --directory _site &

      - name: Wait for server
        run: sleep 3

      - name: Generate CV PDF
        run: node .github/scripts/generate-cv-pdf.js

      - name: Commit updated PDF
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add files/augustine-nguyen-cv.pdf
          git diff --staged --quiet || git commit -m "chore: regenerate CV PDF [skip ci]"
          git push
